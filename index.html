<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume | Jeff Tong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0" rel="stylesheet">
  <link rel="stylesheet" href="css/resume.css">
</head>
<body data-theme="man">
  <button id="fullToggle" class="full-toggle" type="button" aria-label="Toggle full work history">Full: Off</button>

  <div class="theme-dock" aria-label="Theme menu">
    <div class="theme-hotspot" aria-hidden="true"></div>
    <div class="theme-icon" aria-hidden="true">🎨</div>
    <div class="theme-flyout"></div>
  </div>

  <div class="theme-label-wrap">
    <button id="themeLabel" class="theme-label" type="button" aria-label="Current theme">
      Theme: Linux Man
    </button>
  </div>

  <div class="grain" aria-hidden="true"></div>
  <main class="manpage" aria-live="polite">
    <header class="man-head">
      <span id="manHeadLeft">JEFF-TONG(1)</span>
      <span id="manHeadCenter">User Commands</span>
      <span id="manHeadRight">JEFF-TONG(1)</span>
    </header>

    <section class="section-name">
      <h2>NAME</h2>
      <p id="nameLine">Loading...</p>
    </section>

    <section class="section-synopsis">
      <h2>SYNOPSIS</h2>
      <p id="synopsisLine">Loading...</p>
    </section>

    <section class="section-description">
      <h2>DESCRIPTION</h2>
      <p id="descriptionLine">Loading...</p>
    </section>

    <section class="section-contact">
      <h2>CONTACT INFORMATION</h2>
      <div id="contactInfo"></div>
    </section>

    <section class="section-skills">
      <h2>TECHNICAL SKILLS</h2>
      <div id="skillsGrid" class="skills-grid"></div>
    </section>

    <section class="section-work">
      <h2>WORK HISTORY</h2>
      <div id="workHistory"></div>
    </section>

    <section class="section-projects">
      <h2>PROJECTS</h2>
      <div id="projects"></div>
    </section>

    <section class="section-education">
      <h2>EDUCATION</h2>
      <div id="education"></div>
    </section>

    <section class="section-languages">
      <h2>LANGUAGES</h2>
      <p id="languagesLine">Loading...</p>
    </section>

    <section class="section-interests">
      <h2>INTERESTS</h2>
      <p id="interestsLine">Loading...</p>
    </section>

    <footer class="man-foot">
      <span id="footerLeft">jeff-tong.dev</span>
      <span id="footerCenter"></span>
      <span id="footerRight">JEFF-TONG(1)</span>
    </footer>
  </main>

  <script src="js/resume.js?v=20260719a"></script>
</body>
</html>
